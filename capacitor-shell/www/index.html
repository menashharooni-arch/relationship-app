<!doctype html>
<!-- Local fallback for the SwiftCard Capacitor shell. Users never see this in
     normal operation — capacitor.config.ts points server.url at
     https://swiftcard.me. It exists to satisfy the Capacitor CLI's webDir
     requirement and as a last-resort offline placeholder. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SwiftCard</title>
    <style>
      body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
             background:#0a0e1a; color:#e2e8f0; font-family:-apple-system,system-ui,sans-serif; text-align:center; }
      p { font-size:15px; line-height:1.6; padding:0 32px; color:#94a3b8; }
      h1 { font-size:20px; margin-bottom:8px; color:#fff; }
    </style>
  </head>
  <body>
    <div>
      <h1>SwiftCard</h1>
      <p>You appear to be offline.<br/>Reconnect to the internet and reopen the app.</p>
    </div>
  </body>
</html>
